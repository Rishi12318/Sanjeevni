<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health Dashboard - Sanjeevani AI</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: #0b1220; color: #e7eefc; }
    .wrap { max-width: 960px; margin: 0 auto; padding: 32px 16px; }
    .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 18px; }
    h1 { font-size: 22px; margin: 0 0 18px; }
    .row { display: grid; grid-template-columns: 1fr auto; gap: 12px; }
    textarea { width: 100%; min-height: 84px; resize: vertical; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.18); background: rgba(0,0,0,0.25); color: #e7eefc; }
    button { padding: 12px 16px; border-radius: 12px; border: 0; cursor: pointer; background: #6d5efc; color: white; font-weight: 650; }
    button[disabled] { opacity: 0.6; cursor: not-allowed; }
    .out { margin-top: 14px; display: grid; gap: 10px; }
    .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.14); }
    .grid { display: grid; gap: 10px; }
    .muted { color: rgba(231,238,252,0.75); font-size: 14px; }
    ul { margin: 0; padding-left: 18px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Sanjeevani AI — Symptom Triage</h1>

    <div class="card">
      <div class="row">
        <textarea id="symptomsInput" placeholder="Describe your symptoms (e.g., I have fever and headache)"></textarea>
        <button id="triageBtn">Triage</button>
      </div>
      <div class="out" id="triageOut" style="display:none;">
        <div><span class="pill" id="severityPill">severity</span></div>
        <div class="grid">
          <div>
            <div class="muted">Advice</div>
            <div id="adviceText"></div>
          </div>
          <div>
            <div class="muted">Possible conditions</div>
            <ul id="conditionsList"></ul>
          </div>
        </div>
      </div>
      <div class="muted" id="triageErr" style="margin-top:10px; display:none;"></div>
    </div>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
