version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sanjeevni_db
    environment:
      POSTGRES_DB: sanjeevni
      POSTGRES_USER: sanjeevni_user
      POSTGRES_PASSWORD: sanjeevni_pass_local_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanjeevni_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: sanjeevni_backend
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: "django-insecure-local-dev-only-change-in-production"
      POSTGRES_DB: sanjeevni
      POSTGRES_USER: sanjeevni_user
      POSTGRES_PASSWORD: sanjeevni_pass_local_dev
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:8080,http://localhost:8000"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "llama3.1"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
      - ./signatures:/app/signatures
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # Optional: Ollama service for local testing
  # Uncomment to use local Ollama; otherwise point to remote instance
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: sanjeevni_ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   environment:
  #     OLLAMA_HOST: "0.0.0.0:11434"

volumes:
  postgres_data:
  # ollama_data:

networks:
  default:
    name: sanjeevni_network
